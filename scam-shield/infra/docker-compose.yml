# Full ScamShield stack: Postgres + Redis + API + Dashboard.
# Usage (from repo root):  docker compose -f infra/docker-compose.yml up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scamshield
      POSTGRES_PASSWORD: scamshield
      POSTGRES_DB: scamshield
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scamshield"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://scamshield:scamshield@postgres:5432/scamshield
      REDIS_URL: redis://redis:6379/0
      SCAMSHIELD_JWT_SECRET: change-me-in-production
      SCAMSHIELD_CORS_ORIGINS: http://localhost:5173
      SCAMSHIELD_LLM_PROVIDER: deterministic-stub
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]

  dashboard:
    build:
      context: ../apps/dashboard
    environment:
      VITE_API_BASE: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: ["api"]

volumes:
  pgdata:
